<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>羽球賽程表</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

  :root{
    --court-green: #1f6b4d;
    --court-line: #f4f1e8;
    --ink: #14231c;
    --paper: #f4f1e8;
    --accent: #f2b134;
    --net: #0f4534;
    --danger: #b3402a;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--paper);
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--ink);
    padding: 40px 20px 60px;
  }

  .wrap{ max-width: 880px; margin: 0 auto; }

  header{
    display:flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 4px solid var(--ink);
    padding-bottom: 18px;
    margin-bottom: 24px;
    gap: 16px;
    flex-wrap: wrap;
  }

  h1{
    font-family: 'Archivo Black', 'Noto Sans TC', sans-serif;
    font-size: 2.6rem;
    margin: 0;
    letter-spacing: 1px;
    line-height: 1.1;
  }
  h1 span{ color: var(--court-green); }

  .subtitle{
    font-size: 0.95rem;
    color: #555;
    margin-top: 6px;
  }

  .badge{
    background: var(--court-green);
    color: var(--paper);
    font-weight: 700;
    font-size: 0.85rem;
    padding: 8px 16px;
    border-radius: 100px;
    white-space: nowrap;
    cursor: pointer;
    border: none;
  }

  /* ---- Tabs ---- */
  .tabs{
    display:flex;
    gap: 6px;
    margin-bottom: 24px;
    border-bottom: 2px solid var(--ink);
  }
  .tab-btn{
    flex:1;
    background: none;
    border: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 12px 8px;
    cursor: pointer;
    color: #888;
    border-bottom: 4px solid transparent;
    margin-bottom: -2px;
    transition: color 0.2s;
  }
  .tab-btn.active{
    color: var(--ink);
    border-bottom-color: var(--court-green);
  }
  .tab-panel{ display:none; }
  .tab-panel.active{ display:block; }

  /* ---- Tab1: manage ---- */
  .panel-section{
    background: white;
    border: 2px solid var(--ink);
    border-radius: 4px;
    padding: 18px;
    margin-bottom: 20px;
  }
  .panel-section h2{
    font-family: 'Archivo Black', sans-serif;
    font-size: 1.1rem;
    margin: 0 0 14px;
  }

  .player-list{
    display:flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .player-chip{
    display:flex;
    align-items:center;
    gap: 6px;
    background: var(--court-line);
    border: 1.5px solid var(--ink);
    border-radius: 100px;
    padding: 6px 8px 6px 14px;
    font-weight: 700;
    font-size: 0.9rem;
  }
  .player-chip button{
    background: var(--danger);
    color: white;
    border: none;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    line-height: 1;
    cursor: pointer;
    font-size: 0.75rem;
  }

  .add-row{
    display:flex;
    gap: 8px;
  }
  .add-row input[type="text"]{
    flex:1;
    padding: 10px 14px;
    border: 1.5px solid var(--ink);
    border-radius: 100px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.95rem;
    background: var(--court-line);
  }
  .add-row button, .primary-btn{
    background: var(--court-green);
    color: var(--paper);
    border: none;
    border-radius: 100px;
    padding: 10px 18px;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .add-row button:disabled, .primary-btn:disabled{
    background: #bbb;
    cursor: not-allowed;
  }

  .match-builder{
    display: grid;
    grid-template-columns: 1fr 30px 1fr;
    gap: 10px;
    align-items: center;
    margin-bottom: 14px;
  }
  .match-builder .side{
    display:flex;
    flex-direction: column;
    gap: 8px;
  }
  .match-builder select{
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 8px 10px;
    border: 1.5px solid var(--ink);
    border-radius: 100px;
    background: var(--court-line);
    color: var(--ink);
    text-align: center;
    text-align-last: center;
  }
  .match-builder .vs-mini{
    text-align:center;
    font-family: 'Archivo Black', sans-serif;
    color: var(--court-green);
    font-size: 0.85rem;
  }

  .match-list-item{
    display:flex;
    align-items:center;
    justify-content: space-between;
    padding: 10px 14px;
    border: 1.5px solid #ddd;
    border-radius: 4px;
    margin-bottom: 8px;
    font-size: 0.9rem;
    font-weight: 700;
  }
  .match-list-item .del-btn{
    background: var(--danger);
    color: white;
    border: none;
    border-radius: 100px;
    padding: 5px 12px;
    font-size: 0.75rem;
    cursor: pointer;
    font-weight: 700;
  }

  .hint{
    font-size: 0.8rem;
    color: #888;
    margin-top: 6px;
  }
  .error-text{
    font-size: 0.8rem;
    color: var(--danger);
    margin-top: 6px;
    display:none;
  }
  .error-text.show{ display:block; }

  /* ---- Tab2: games ---- */
  .games{
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .empty-state{
    text-align:center;
    padding: 60px 20px;
    background: white;
    border: 2px dashed #c9c3ad;
    border-radius: 4px;
    color: #888;
    font-weight: 700;
    font-size: 1.05rem;
  }

  .game{
    position: relative;
    background: white;
    border: 2px solid var(--ink);
    border-radius: 4px;
    overflow: hidden;
  }

  .game-num{
    background: var(--ink);
    color: var(--paper);
    display:flex;
    align-items:baseline;
    justify-content:center;
    gap: 8px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 1.2rem;
    padding: 8px 0;
  }
  .game-num small{
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.65rem;
    font-weight: 400;
    color: #c9c3ad;
  }

  .match-row{
    display: grid;
    grid-template-columns: 1fr 44px 1fr;
    align-items: stretch;
  }

  .team{
    display:flex;
    flex-direction: column;
    align-items:center;
    justify-content:center;
    gap: 8px;
    padding: 16px 10px;
  }

  .player{
    background: var(--court-line);
    border: 1.5px solid var(--ink);
    border-radius: 100px;
    padding: 6px 16px;
    font-weight: 700;
    font-size: 1.05rem;
    text-align:center;
    min-width: 72px;
  }

  .vs{
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Archivo Black', sans-serif;
    color: var(--accent);
    background: var(--net);
    font-size: 0.85rem;
  }

  .score-row{
    display:flex;
    align-items:center;
    border-top: 1.5px dashed #c9c3ad;
  }
  .score-box{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding: 8px;
    font-size: 0.85rem;
    color:#777;
  }
  .score-box input{
    width: 48px;
    text-align:center;
    font-size: 1.05rem;
    font-weight:700;
    border: 1.5px solid #c9c3ad;
    border-radius: 4px;
    padding: 4px;
    color: var(--ink);
    background: var(--paper);
  }
  .score-box.mid{ flex: 0 0 44px; }

  .saved-flag{
    text-align:center;
    font-size: 0.7rem;
    color: var(--court-green);
    font-weight: 700;
    height: 14px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .saved-flag.show{ opacity: 1; }

  /* ---- Tab3: standings ---- */
  table{
    width: 100%;
    border-collapse: collapse;
    background: white;
    border: 2px solid var(--ink);
  }
  th, td{
    padding: 10px 12px;
    text-align: center;
    border-bottom: 1px solid #ddd;
    font-size: 0.95rem;
  }
  th{
    background: var(--ink);
    color: var(--paper);
    font-weight: 700;
  }
  tr:last-child td{ border-bottom: none; }
  td.name{ text-align:left; font-weight:700; }
  td.pos{ color: var(--court-green); font-weight:700; }

  footer{
    margin-top: 40px;
    border-top: 3px solid var(--ink);
    padding-top: 20px;
    display:flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color:#555;
    flex-wrap: wrap;
    gap: 8px;
  }

  .note{
    background: var(--court-green);
    color: var(--paper);
    border-radius: 4px;
    padding: 14px 18px;
    font-size: 0.85rem;
    margin-top: 20px;
    line-height: 1.6;
  }
  .note b{ color: var(--accent); }

  @media (max-width: 600px){
    h1{ font-size: 1.8rem; }
    .match-row{ grid-template-columns: 1fr 34px 1fr; }
    .match-builder{ grid-template-columns: 1fr 24px 1fr; }
    .player{ font-size: 0.9rem; padding: 5px 8px; min-width: 60px; }
    .tab-btn{ font-size: 0.8rem; padding: 10px 4px; }
  }

  @media print{
    body{ padding: 0; background: white; }
    .game{ break-inside: avoid; }
    .badge, .tabs{ display:none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <h1>羽球<span>賽程表</span></h1>
      <div class="subtitle">成員與賽事可自行新增・積分自動計算</div>
    </div>
    <button class="badge" id="resetBtn">重設所有分數</button>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="manage">成員 / 賽事新增</button>
    <button class="tab-btn" data-tab="games">賽事與分數</button>
    <button class="tab-btn" data-tab="standings">排名</button>
  </div>

  <!-- Tab 1 -->
  <div class="tab-panel active" id="panel-manage">

    <div class="panel-section">
      <h2>球員名單</h2>
      <div class="player-list" id="playerList"></div>
      <div class="add-row">
        <input type="text" id="newPlayerInput" placeholder="輸入新球員姓名">
        <button id="addPlayerBtn">新增球員</button>
      </div>
      <div class="hint">移除球員不會刪除已存在的賽事，但該球員將不會出現在排名中。</div>
    </div>

    <div class="panel-section">
      <h2>新增賽事</h2>
      <div class="match-builder">
        <div class="side">
          <select id="pickL1"><option value="">左隊球員 1</option></select>
          <select id="pickL2"><option value="">左隊球員 2</option></select>
        </div>
        <div class="vs-mini">VS</div>
        <div class="side">
          <select id="pickR1"><option value="">右隊球員 1</option></select>
          <select id="pickR2"><option value="">右隊球員 2</option></select>
        </div>
      </div>
      <button class="primary-btn" id="addMatchBtn">新增這場賽事</button>
      <div class="error-text" id="matchError">請選擇 4 位不重複的球員</div>

      <div style="margin-top:20px;" id="matchList"></div>
    </div>

  </div>

  <!-- Tab 2 -->
  <div class="tab-panel" id="panel-games">
    <div class="games" id="games"></div>
    <div class="note">
      <b>積分計算方式：</b>每場比賽結束後填入雙方分數，個人積分 = 該球員參與比賽的「淨勝分（得分－失分）」加總，若加總為負則以 0 分計。分數會自動儲存在此瀏覽器中，重新整理頁面也不會消失。
    </div>
  </div>

  <!-- Tab 3 -->
  <div class="tab-panel" id="panel-standings">
    <table>
      <thead>
        <tr><th>排名</th><th style="text-align:left">球員</th><th>淨勝分</th></tr>
      </thead>
      <tbody id="standingsBody"></tbody>
    </table>
  </div>

  <footer>
    <span id="footerPlayers"></span>
    <span id="footerMatches"></span>
  </footer>

</div>

<script>
  const STORAGE_KEY = "badminton_app_v3";

  const DEFAULT_STATE = {
    players: ["哲瑋","KK","Amber","亮宇","心育","炸哥","茄魚","寧倢","Abby","爸爸"],
    matches: [
      { id: "m1", left: ["哲瑋","爸爸"], right: ["KK","Abby"] },
      { id: "m2", left: ["哲瑋","寧倢"], right: ["KK","茄魚"] },
      { id: "m3", left: ["Amber","寧倢"], right: ["亮宇","茄魚"] },
      { id: "m4", left: ["心育","Abby"], right: ["炸哥","爸爸"] },
      { id: "m5", left: ["Amber","亮宇"], right: ["心育","炸哥"] },
    ],
    scores: {},
    nextMatchNum: 6,
  };

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return JSON.parse(JSON.stringify(DEFAULT_STATE));
      const parsed = JSON.parse(raw);
      return Object.assign(JSON.parse(JSON.stringify(DEFAULT_STATE)), parsed);
    }catch(e){
      return JSON.parse(JSON.stringify(DEFAULT_STATE));
    }
  }

  function saveState(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }catch(e){
      console.error("無法儲存資料", e);
    }
  }

  let state = loadState();

  // ---------------- Tabs ----------------
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("panel-" + btn.dataset.tab).classList.add("active");
    });
  });

  // ---------------- Tab1: Players ----------------
  function renderPlayerList(){
    const el = document.getElementById("playerList");
    el.innerHTML = state.players.map(p => `
      <span class="player-chip">${p}<button data-player="${p}" title="移除球員">✕</button></span>
    `).join("") || `<span class="hint">尚無球員，請先新增。</span>`;

    el.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => {
        state.players = state.players.filter(p => p !== btn.dataset.player);
        saveState();
        renderAll();
      });
    });
  }

  document.getElementById("addPlayerBtn").addEventListener("click", () => {
    const input = document.getElementById("newPlayerInput");
    const name = input.value.trim();
    if(!name) return;
    if(state.players.includes(name)){
      input.value = "";
      return;
    }
    state.players.push(name);
    saveState();
    input.value = "";
    renderAll();
  });

  document.getElementById("newPlayerInput").addEventListener("keydown", (e) => {
    if(e.key === "Enter") document.getElementById("addPlayerBtn").click();
  });

  // ---------------- Tab1: Match builder ----------------
  function fillPickSelect(id, placeholder){
    const sel = document.getElementById(id);
    const current = sel.value;
    sel.innerHTML = `<option value="">${placeholder}</option>` +
      state.players.map(p => `<option value="${p}" ${p===current?"selected":""}>${p}</option>`).join("");
  }

  function renderPickSelects(){
    fillPickSelect("pickL1", "左隊球員 1");
    fillPickSelect("pickL2", "左隊球員 2");
    fillPickSelect("pickR1", "右隊球員 1");
    fillPickSelect("pickR2", "右隊球員 2");
  }

  document.getElementById("addMatchBtn").addEventListener("click", () => {
    const l1 = document.getElementById("pickL1").value;
    const l2 = document.getElementById("pickL2").value;
    const r1 = document.getElementById("pickR1").value;
    const r2 = document.getElementById("pickR2").value;
    const errorEl = document.getElementById("matchError");

    const chosen = [l1,l2,r1,r2];
    const allFilled = chosen.every(Boolean);
    const noDupes = new Set(chosen).size === chosen.length;

    if(!allFilled || !noDupes){
      errorEl.classList.add("show");
      return;
    }
    errorEl.classList.remove("show");

    const id = "m" + state.nextMatchNum;
    state.nextMatchNum += 1;
    state.matches.push({ id, left: [l1,l2], right: [r1,r2] });
    saveState();

    ["pickL1","pickL2","pickR1","pickR2"].forEach(id => document.getElementById(id).value = "");
    renderAll();
  });

  function renderMatchList(){
    const el = document.getElementById("matchList");
    if(state.matches.length === 0){
      el.innerHTML = `<div class="hint">目前沒有賽事安排</div>`;
      return;
    }
    el.innerHTML = state.matches.map((m, i) => `
      <div class="match-list-item">
        <span>第 ${i+1} 場：${m.left[0]}／${m.left[1]}　VS　${m.right[0]}／${m.right[1]}</span>
        <button class="del-btn" data-id="${m.id}">刪除</button>
      </div>
    `).join("");

    el.querySelectorAll(".del-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        state.matches = state.matches.filter(m => m.id !== btn.dataset.id);
        delete state.scores[btn.dataset.id];
        saveState();
        renderAll();
      });
    });
  }

  // ---------------- Tab2: Games & scores ----------------
  function renderGames(){
    const container = document.getElementById("games");

    if(state.matches.length === 0){
      container.innerHTML = `<div class="empty-state">目前沒有賽事安排</div>`;
      return;
    }

    container.innerHTML = "";
    state.matches.forEach((m, i) => {
      const saved = state.scores[m.id] || { left: "", right: "" };

      const el = document.createElement("div");
      el.className = "game";
      el.innerHTML = `
        <div class="game-num">${String(i+1).padStart(2,"0")}<small>GAME</small></div>
        <div class="match-row">
          <div class="team">
            <span class="player">${m.left[0]}</span>
            <span class="player">${m.left[1]}</span>
          </div>
          <div class="vs">VS</div>
          <div class="team">
            <span class="player">${m.right[0]}</span>
            <span class="player">${m.right[1]}</span>
          </div>
        </div>
        <div class="score-row">
          <div class="score-box">左隊 <input type="number" inputmode="numeric" data-match="${m.id}" data-side="left" value="${saved.left}"></div>
          <div class="score-box mid">:</div>
          <div class="score-box">右隊 <input type="number" inputmode="numeric" data-match="${m.id}" data-side="right" value="${saved.right}"></div>
        </div>
        <div class="saved-flag" id="flag-${m.id}">已儲存 ✓</div>
      `;
      container.appendChild(el);
    });

    container.querySelectorAll("input[data-match]").forEach(input => {
      input.addEventListener("input", onScoreChange);
    });
  }

  let flagTimeout;
  function onScoreChange(e){
    const id = e.target.dataset.match;
    const side = e.target.dataset.side;
    if(!state.scores[id]) state.scores[id] = { left: "", right: "" };
    state.scores[id][side] = e.target.value;
    saveState();
    renderStandings();

    const flag = document.getElementById("flag-" + id);
    if(flag){
      flag.classList.add("show");
      clearTimeout(flagTimeout);
      flagTimeout = setTimeout(() => flag.classList.remove("show"), 1200);
    }
  }

  // ---------------- Tab3: Standings ----------------
  function renderStandings(){
    const net = {};
    state.matches.forEach(m => {
      const s = state.scores[m.id];
      if(!s || s.left === "" || s.right === "" || s.left === undefined || s.right === undefined) return;
      const l = parseInt(s.left, 10);
      const r = parseInt(s.right, 10);
      if(isNaN(l) || isNaN(r)) return;
      const diff = l - r;
      m.left.forEach(p => { net[p] = (net[p] || 0) + diff; });
      m.right.forEach(p => { net[p] = (net[p] || 0) - diff; });
    });

    const rows = state.players.map(p => ({ name: p, score: Math.max(net[p] || 0, 0) }));
    rows.sort((a,b) => b.score - a.score);

    const tbody = document.getElementById("standingsBody");
    if(rows.length === 0){
      tbody.innerHTML = `<tr><td colspan="3">尚無球員資料</td></tr>`;
      return;
    }
    let displayRank = 0;
    tbody.innerHTML = rows.map((r, i) => {
      if(i === 0 || r.score !== rows[i-1].score){
        displayRank = i + 1;
      }
      return `
      <tr>
        <td>${displayRank}</td>
        <td class="name">${r.name}</td>
        <td class="${r.score > 0 ? "pos" : ""}">${r.score}</td>
      </tr>
    `;
    }).join("");
  }

  // ---------------- Reset ----------------
  const resetBtn = document.getElementById("resetBtn");
  let confirmingReset = false;
  let resetConfirmTimeout;

  resetBtn.addEventListener("click", () => {
    if(!confirmingReset){
      confirmingReset = true;
      resetBtn.textContent = "確定要清除嗎？再按一次";
      resetConfirmTimeout = setTimeout(() => {
        confirmingReset = false;
        resetBtn.textContent = "重設所有分數";
      }, 3000);
      return;
    }

    clearTimeout(resetConfirmTimeout);
    confirmingReset = false;
    resetBtn.textContent = "重設所有分數";

    state.scores = {};
    saveState();
    renderAll();
  });

  // ---------------- Footer ----------------
  function renderFooter(){
    document.getElementById("footerPlayers").textContent = `${state.players.length} 位球員`;
    document.getElementById("footerMatches").textContent = `${state.matches.length} 場比賽`;
  }

  function renderAll(){
    renderPlayerList();
    renderPickSelects();
    renderMatchList();
    renderGames();
    renderStandings();
    renderFooter();
  }

  renderAll();
</script>

</body>
</html>
